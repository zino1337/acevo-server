name: CI

on:
  pull_request:
    branches:
      - main
      - staging
  push:
    branches:
      - main
      - staging
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_IMAGE_NAME: ${{ vars.DOCKER_IMAGE_NAME }}
  DOCKER_IMAGE_TAG: ${{ vars.DOCKER_IMAGE_TAG }}
  DOCKER_IMAGE_TAG_STAGING: ${{ vars.DOCKER_IMAGE_TAG_STAGING }}

jobs:
  check:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run checks
        run: npm run check

  docker:
    name: Build and push Docker image
    runs-on: ubuntu-latest
    needs: check
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Resolve Docker image tag
        id: docker-image-tag
        run: |
          case "${GITHUB_REF_NAME}" in
            main)
              resolved_tag="${DOCKER_IMAGE_TAG}"
              required_var="DOCKER_IMAGE_TAG"
              ;;
            staging)
              resolved_tag="${DOCKER_IMAGE_TAG_STAGING}"
              required_var="DOCKER_IMAGE_TAG_STAGING"
              ;;
            *)
              echo "Docker image publishing is only configured for main or staging (got ${GITHUB_REF_NAME})."
              exit 1
              ;;
          esac

          test -n "${resolved_tag}" || {
            echo "${required_var} GitHub variable is required."
            exit 1
          }

          echo "RESOLVED_DOCKER_IMAGE_TAG=${resolved_tag}" >> "${GITHUB_ENV}"
          echo "tag=${resolved_tag}" >> "${GITHUB_OUTPUT}"
          echo "Resolved Docker image tag: ${resolved_tag}"

      - name: Validate Docker image variables
        run: |
          test -n "${DOCKER_IMAGE_NAME}" || {
            echo "DOCKER_IMAGE_NAME GitHub variable is required."
            exit 1
          }
          test -n "${RESOLVED_DOCKER_IMAGE_TAG}" || {
            echo "RESOLVED_DOCKER_IMAGE_TAG is required."
            exit 1
          }

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.DOCKER_IMAGE_NAME }}:${{ steps.docker-image-tag.outputs.tag }}

      - name: Update Docker Hub description
        if: github.ref_name == 'main'
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKER_IMAGE_NAME }}
          readme-filepath: ./README.dockerhub.md
          short-description: Assetto Corsa EVO dedicated server Docker image
